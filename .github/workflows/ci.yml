# Status badge: https://github.com/winstoncvm/DogFrce-Security-Services-Custom-Odoo-Modules/actions/workflows/ci.yml/badge.svg
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Odoo modules + mobile type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          cp .env.example .env
          echo "ODOO_DB=dogforce_ci" >> .env
          echo "COMPOSE_PROJECT_NAME=dogforce-odoo-ci" >> .env

      - name: Start Docker stack
        run: |
          export COMPOSE_PROJECT_NAME=dogforce-odoo-ci
          docker compose -f deploy/docker-compose.yml --env-file .env up -d

      - name: Wait for Odoo
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8069/web/health >/dev/null 2>&1 || \
               curl -sf http://localhost:8069/ >/dev/null 2>&1; then
              echo "Odoo is up"
              exit 0
            fi
            echo "Waiting for Odoo... ($i/30)"
            sleep 10
          done
          echo "Odoo did not start in time"
          docker compose -f deploy/docker-compose.yml logs odoo
          exit 1

      - name: Install modules
        run: |
          MODULES="security_base,security_operations,security_attendance,security_leave,security_l10n_na,security_payroll_core,security_loans,security_discipline,security_billing,security_accounting_controls,security_client_reports,security_reporting,security_documents,security_equipment,security_fleet,security_shift_planner,security_ai_engine,security_notifications,security_dogforce_migration,security_mobile"
          docker exec $(docker compose -f deploy/docker-compose.yml ps -q odoo) \
            odoo -c /etc/odoo/odoo.conf -d ${TEST_DB:-dogforce_ci} \
            -i "$MODULES" \
            --no-http --stop-after-init || true

      - name: Python syntax check
        run: |
          find custom_addons -name "*.py" | grep -v __pycache__ | \
            xargs python3 -m py_compile && echo "All Python files OK"

      - name: Run Odoo module tests
        run: |
          export TEST_DB=dogforce_ci
          ./scripts/run-tests.sh \
            security_payroll_core,security_attendance,security_leave,security_billing,security_shift_planner,security_equipment,security_fleet,security_mobile

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Mobile type check
        working-directory: mobile
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run ts:check

      - name: Show logs on failure
        if: failure()
        run: docker compose -f deploy/docker-compose.yml logs
