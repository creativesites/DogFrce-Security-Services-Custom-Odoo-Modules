# ─────────────────────────────────────────────────────────────────────────────
# fly.toml — DeployGuard Security Platform
# Region: Johannesburg (jnb) — closest to Namibia
# ─────────────────────────────────────────────────────────────────────────────

app            = "deployguard"
primary_region = "ams"

# ── Build ──────────────────────────────────────────────────────────────────────
[build]
  dockerfile = "Dockerfile"

# ── Deploy strategy ────────────────────────────────────────────────────────────
# A temporary HTTP server keeps the health check alive while Odoo installs.
# grace_period is generous enough for a 15-minute first-install.

# ── Non-secret environment variables ──────────────────────────────────────────
[env]
  PORT       = "8080"   # Fly.io default — must match internal_port below
  DEMO_DATA  = "false"  # Set to "true" via: fly secrets set DEMO_DATA=true

# ── HTTP service — Fly proxy routes :80/:443 → internal :8080 ─────────────────
[http_service]
  internal_port      = 8080
  force_https        = true
  auto_stop_machines = false   # Keep always-on (avoids 90s Odoo cold-start)
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 30
    soft_limit = 25

# ── Machine sizing ─────────────────────────────────────────────────────────────
# shared-cpu-1x @ 2GB ≈ $11/month — minimum viable for Odoo
[[vm]]
  memory   = "2gb"
  cpu_kind = "shared"
  cpus     = 1

# ── Persistent volume (Odoo filestore + uploaded attachments) ─────────────────
[[mounts]]
  source       = "dogforce_filestore"
  destination  = "/var/lib/odoo"
  initial_size = "10gb"

# ── Health check ──────────────────────────────────────────────────────────────
# release_command handles install — main machine only needs to boot Odoo (~60s)
[checks]
  [checks.odoo_health]
    grace_period = "1200s"
    interval     = "30s"
    method       = "get"
    path         = "/web/health"
    port         = 8080
    timeout      = "15s"
    type         = "http"
