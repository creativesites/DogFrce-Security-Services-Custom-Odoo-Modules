# fly.toml app configuration file generated for deployguard on 2026-06-05T08:22:04Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app            = "deployguard"
primary_region = "ams"

[build]
  dockerfile = 'Dockerfile'

[env]
  DEMO_DATA = 'false'
  ODOO_PORT = '8069'
  ODOO_PROXY_MODE = 'true'

[[mounts]]
  source = 'dogforce_filestore'
  destination = '/var/lib/odoo'
  initial_size = '10gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 30
    soft_limit = 25

[checks]
  [checks.odoo_health]
    grace_period = "1200s"
    interval     = "30s"
    method       = "get"
    path         = "/web/health"
    port         = 8080
    timeout      = "15s"
    type         = "http"

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
